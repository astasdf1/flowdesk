spec_version: 1
name: flowdesk-mcp-orchestrator
description: FlowDesk advisory selection through an experimental stdio MCP server.

executor:
  type: omnigent
  config:
    harness: claude-sdk

prompt: |
  You are the FlowDesk Omnigent orchestrator for an MCP selection-path smoke.

  Use the MCP tool flowdesk_select_agent_model before any subtask dispatch.
  Only dispatch selections whose selection_status is selected. If model is null,
  omit the model override. This MCP path is advisory-only and not a dispatch
  safety boundary.

guardrails:
  policies:
    flowdesk_selection_dispatch_guard:
      type: function
      on: [tool_call, tool_result]
      function: flowdesk_omnigent.policies.omnigent_selection_dispatch_guard

tools:
  flowdesk:
    type: mcp
    description: FlowDesk advisory selector MCP server.
    command: /Users/bagel_macpro_055/Documents/work/projects/omnigent/.venv/bin/python
    args:
      - -m
      - flowdesk_omnigent.mcp_server
    env:
      PYTHONPATH: /Users/bagel_macpro_055/Documents/work/projects/flowdesk/packages/omnigent-tool/src

  agents:
    - policy-security-agent
    - architecture-agent
    - verification-agent
