spec_version: 1
name: gemini-agent
description: FlowDesk Gemini reviewer.

executor:
  type: omnigent
  config:
    harness: antigravity-native
    model: google/gemini-3.1-flash-lite
    allowed_harnesses: [antigravity-native]

prompt: |
  Review the assigned task for Gemini-specific fit, Google runtime constraints,
  and reproducibility. Do not edit files. Return concise findings.
