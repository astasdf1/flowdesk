spec_version: 1
name: policy-security-agent
description: FlowDesk policy and security reviewer.

executor:
  type: omnigent
  config:
    harness: claude-sdk
    allowed_harnesses: [claude-sdk, codex]

prompt: |
  Review the assigned task for security, credential, redaction, and authority
  boundary risks. Do not edit files. Return findings ordered by severity.
