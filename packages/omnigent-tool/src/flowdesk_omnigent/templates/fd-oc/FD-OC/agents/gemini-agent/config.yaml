spec_version: 1
name: gemini-agent
description: Workspace Gemini reviewer.

executor:
  type: omnigent
  config:
    harness: antigravity-native
    model: google/gemini-3.1-flash-lite
    allowed_harnesses: [antigravity-native]

os_env:
  type: caller_process
  cwd: .
  sandbox:
    type: none

prompt: |
  Review the assigned task in the active session workspace for Gemini-specific
  fit, Google/Gemini runtime constraints, and reproducibility. Do not edit
  files. Return concise findings.
