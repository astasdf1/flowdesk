spec_version: 1
name: general-agent
description: General workspace task worker.

executor:
  type: omnigent
  config:
    harness: codex
    allowed_harnesses: [codex, claude-native]

os_env:
  type: caller_process
  cwd: .
  sandbox:
    type: none

prompt: |
  Handle the assigned general task in the active session workspace. Inspect
  workspace-local instructions before acting. Keep work minimal, report what
  you did, what you verified, and any blockers. Do not delegate further work
  unless explicitly instructed by the parent orchestrator.
