name: Publish Omnigent Tool

on:
  workflow_dispatch:
    inputs:
      publish_target:
        description: "Publish target"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi
  push:
    tags:
      - "omnigent-tool-v*"

permissions:
  contents: read

jobs:
  build-and-smoke:
    name: Build and smoke test package
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Run release preflight
        run: npm run release:omnigent-tool -- --out-dir dist/omnigent-tool --keep-temp

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flowdesk-omnigent-tool-dist
          path: dist/omnigent-tool/*
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build-and-smoke
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish_target == 'testpypi'
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: flowdesk-omnigent-tool-dist
          path: dist/omnigent-tool

      - name: Publish package to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/omnigent-tool

  publish-pypi:
    name: Publish to PyPI
    needs: build-and-smoke
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_target == 'pypi')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: flowdesk-omnigent-tool-dist
          path: dist/omnigent-tool

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/omnigent-tool
